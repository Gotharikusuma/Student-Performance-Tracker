{% extends "base.html" %}

{% block content %}

<h2>{{ student.name }} Performance Chart</h2>

<canvas id="marksChart" width="400" height="200"></canvas>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('marksChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: {{ subjects | tojson }},
        datasets: [{
            label: 'Marks',
            data: {{ marks | tojson }},
            backgroundColor: 'rgba(54, 162, 235, 0.6)',
            borderWidth: 1
        }]
    },
    options: {
        scales: {
            y: {
                beginAtZero: true,
                max: 100
            }
        }
    }
});
</script>

<br>

<a href="/view_students" class="btn btn-secondary">Back</a>

{% endblock %}
