<!DOCTYPE html>
<html>
<head>
    <title>Student Admin Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
        }

        .sidebar {
            height: 100vh;
            width: 220px;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #212529;
            padding-top: 20px;
        }

        .sidebar a {
            padding: 10px;
            text-decoration: none;
            color: white;
            display: block;
        }

        .sidebar a:hover {
            background-color: #495057;
        }

        .main {
            margin-left: 230px;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4 class="text-white text-center">Admin Panel</h4>
    <hr class="text-white">

    <a href="/">Dashboard</a>
    <a href="/add_student">Add Student</a>
    <a href="/view_students">View Students</a>
</div>

<div class="main">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
