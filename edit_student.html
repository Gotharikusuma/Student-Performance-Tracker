{% extends "base.html" %}

{% block content %}

<div class="container mt-4">


<div class="card shadow mx-auto" style="max-width: 500px;">

    <div class="card-header bg-warning text-dark text-center">
        <h3>✏️ Edit Student</h3>
    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Student Name</label>
                <input type="text"
                       name="name"
                       value="{{ student.name }}"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Class</label>
                <input type="text"
                       name="class"
                       value="{{ student.class }}"
                       class="form-control"
                       required>
            </div>

            <button type="submit" class="btn btn-warning">
                Update Student
            </button>

            <a href="/view_students" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</div>


</div>

{% endblock %}
